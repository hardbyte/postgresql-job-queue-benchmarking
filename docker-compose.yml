services:
  postgres:
    # Pinned to a specific minor version. Do not track `:17-alpine` — autovacuum
    # behaviour can change across minors, and the long-horizon bench needs
    # run-over-run comparability.
    image: ${POSTGRES_IMAGE:-postgres:17.2-alpine}
    environment:
      POSTGRES_PASSWORD: bench
      POSTGRES_USER: bench
    ports:
      - "15555:5432"
    volumes:
      - ./init-databases.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./postgres.conf:/etc/postgresql/postgresql.conf:ro
    shm_size: 256mb
    command:
      - "postgres"
      - "-c"
      - "config_file=/etc/postgresql/postgresql.conf"
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 8G
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bench"]
      interval: 2s
      timeout: 5s
      retries: 10
