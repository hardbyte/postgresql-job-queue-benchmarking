# Postgres configuration overrides for the portable + long-horizon benchmark
# harness. Pinned so runs on developer laptops match CI match the blog.
#
# Autovacuum settings dominate recovery curves in the long-horizon runner —
# leaving them at defaults would mean a PG upstream parameter tweak silently
# breaks cross-run comparability. Anything touched here should be captured
# verbatim into manifest.json at run start.

# Connections & memory
# 400 chosen with margin for 4-replica runs: each replica's bench pool
# defaults to 80 connections (8 workers × 4 + 48 = 80), so 4×80 = 320
# under steady offered load, leaving headroom for cancel listeners and
# admin connections. Smaller PG ceilings (e.g. 200) caused the 12h
# bench to hit `pool timed out` errors and a downstream stall once the
# spawned `complete_job` futures piled up holding captured job state.
max_connections = 400
listen_addresses = '*'
shared_buffers = 256MB
work_mem = 8MB
maintenance_work_mem = 128MB

# WAL / durability (matched to prior docker-compose defaults)
synchronous_commit = on
wal_level = replica

# Autovacuum (explicit defaults — documented so they don't drift silently)
autovacuum = on
autovacuum_naptime = 60s
autovacuum_vacuum_cost_delay = 2ms
autovacuum_vacuum_cost_limit = 200
autovacuum_vacuum_scale_factor = 0.2
autovacuum_analyze_scale_factor = 0.1
autovacuum_vacuum_threshold = 50
autovacuum_analyze_threshold = 50

# Logging: keep long queries visible without drowning in noise
log_min_duration_statement = 5000
log_autovacuum_min_duration = 0
